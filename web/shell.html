<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANTIGRAVITY – Play Online</title>
    <meta name="description" content="Antigravity — A gravity-flip arcade game. Hold SPACE or tap to defy gravity, dodge obstacles, and beat your high score!">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            color: #ccc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 0.25em;
            color: #b464ff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* Canvas wrapper */
        .game-container {
            position: relative;
            border: 2px solid #64ffb4;
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 0 20px rgba(100, 255, 180, 0.15),
                0 0 60px rgba(180, 100, 255, 0.08);
        }

        canvas.emscripten {
            display: block;
            cursor: pointer;
        }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #1a1a2e;
            border-top-color: #b464ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #progress {
            width: 200px; height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #b464ff, #64ffb4);
            width: 0%;
            transition: width 0.2s;
            border-radius: 3px;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <h1>🚀 Antigravity</h1>

    <div class="game-container">
        <div id="loading">
            <div class="spinner"></div>
            <div style="color: #888; font-size: 0.9rem;">Loading game…</div>
            <div id="progress"><div id="progress-bar"></div></div>
        </div>
        <canvas class="emscripten" id="canvas"
                oncontextmenu="event.preventDefault()"
                tabindex="-1"></canvas>
    </div>

    <p class="hint">SPACE / Click to flip gravity &nbsp;•&nbsp; P to pause</p>

    <script>
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })(),

            setStatus: function(text) {
                // Parse progress from Emscripten status text
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var bar = document.getElementById('progress-bar');
                if (m) {
                    var pct = (parseInt(m[2]) / parseInt(m[4])) * 100;
                    bar.style.width = pct + '%';
                } else if (text === '') {
                    // Done loading
                    bar.style.width = '100%';
                    setTimeout(function() {
                        document.getElementById('loading').classList.add('hidden');
                    }, 300);
                }
            },

            monitorRunDependencies: function(left) {
                // Could track remaining dependencies here
            }
        };

        // Focus the canvas so keyboard events work immediately
        window.addEventListener('load', function() {
            document.getElementById('canvas').focus();
        });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
