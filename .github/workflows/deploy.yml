name: Build WebAssembly Artifact

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Create output directory
        run: mkdir -p web

      - name: Clone and Build Raylib
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cd raylib-src/src
          make PLATFORM=PLATFORM_WEB -B

      - name: Build WASM
        run: |
          emcc antigravity_web.c -o web/index.html \
            -I raylib-src/src \
            -L raylib-src/src \
            -lraylib \
            -Os -Wall \
            -DPLATFORM_WEB \
            -s USE_GLFW=3 \
            -s ASYNCIFY \
            -s INITIAL_MEMORY=67108864 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --shell-file web/shell.html

      - name: Deploy to gh-pages branch
        run: |
          cd web
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy WebAssembly build"
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
